# 回测框架配置文件 v1.0
# 统一配置管理

# ==================== 策略配置 ====================
strategy:
  # 默认策略类型
  default_type: "打板策略"
  
  # 支持的策略列表
  supported_types:
    - "打板策略"
    - "缩量潜伏策略"
    - "板块轮动策略"

# ==================== 风控参数 ====================
risk:
  # 通用参数
  stop_loss: 0.06           # 止损比例
  stop_profit: 0.12         # 止盈比例
  max_hold_days: 3          # 最长持股天数
  max_positions: 2          # 最大持仓数量
  position_ratio: 0.2       # 单只股票仓位比例
  
  # 策略专属参数
  strategy_params:
    打板策略:
      slippage_rate: 0.015
      high_open_fail_rate: 0.5
      max_hold_days: 3
    缩量潜伏策略:
      slippage_rate: 0.005
      high_open_fail_rate: 0.1
      max_hold_days: 7
    板块轮动策略:
      slippage_rate: 0.008
      high_open_fail_rate: 0.2
      max_hold_days: 5
      max_positions: 3

# ==================== 数据配置 ====================
data:
  # 数据目录
  data_dir: "/data/agents/master/data_all_stocks"
  limit_file: "/data/agents/master/data/limit_list_d.parquet"
  cache_dir: "/data/agents/master/cache"
  
  # 数据源
  sources:
    - tushare
    - akshare  # 免费备用数据源

# ==================== 回测配置 ====================
backtest:
  initial_capital: 10000
  benchmark_return: 0.08
  commission_rate: 0.00025
  min_commission: 5
  stamp_tax_rate: 0.001
  
  # 时间范围
  train_start: "2023-01-01"
  train_end: "2024-06-30"
  test_start: "2024-07-01"
  test_end: "2024-12-31"

# ==================== 功能开关 ====================
features:
  # 核心功能
  qlib_enhancement: true
  vector_engine: true
  dynamic_slippage: true
  buy_difficulty: true
  
  # 高级功能
  auto_tune: true
  parallel_backtest: true
  benchmark_compare: true
  health_check: true
  
  # 数据功能
  sentiment: true
  ml_factor: true
  portfolio_opt: true
  execution_opt: true
  
  # 输出功能
  visualization: true
  html_report: true

# ==================== 自动调参配置 ====================
auto_tune:
  metric: "sharpe_ratio"
  n_trials: 20
  param_ranges:
    stop_loss: [0.04, 0.05, 0.06, 0.07]
    stop_profit: [0.08, 0.10, 0.12, 0.15]
    max_hold_days: [2, 3, 4, 5]

# ==================== 筛选配置 ====================
filter:
  exclude_st: true
  min_amount: 100000        # 最小成交额（万元）
  min_turnover: 0.03        # 最小换手率

# ==================== 打板策略专属配置 ====================
limit_up:
  # 筛选条件
  min_order_ratio: 0.01     # 最小封单比例
  max_break_times: 1        # 最大炸板次数
  link_board_range: [2, 4]  # 连板高度范围
  exclude_late_board: true  # 排除尾盘板
  
  # 评分权重（23维）
  weights:
    order_amount: 15        # 封单金额
    up_down_times: 15       # 连板高度
    inst_buy: 15            # 机构买入
    youzi_buy: 10           # 游资买入
    concept_count: 10       # 概念热度
    break_limit_times: -5   # 炸板次数（负分）
    float_market_cap: 10    # 流通市值
    turnover_ratio: 5       # 换手率
    no_reduction: 5         # 无减持
    no_inquiry: 5           # 无问询
    is_main_industry: 5     # 主线行业

# ==================== 缩量潜伏策略专属配置 ====================
volume_contraction:
  # 首板条件
  board_volume_growth: 1.5  # 首板放量倍数
  
  # 缩量条件
  shrink_volume_ratio: [0.33, 0.5]  # 缩量到首板的1/3~1/2
  shrink_days_range: [3, 10]        # 回调天数范围
  
  # 支撑位
  pullback_support_level: 0.5       # 支撑位（1/2分位）
  support_tolerance: 0.02           # 支撑位容差

# ==================== 通知配置 ====================
notification:
  wechat_enabled: true
  feishu_enabled: true
  
# ==================== 日志配置 ====================
logging:
  level: "INFO"
  file: "/data/agents/master/logs/backtest.log"